<!DOCTYPE html>
<html lang="pt">
<head>
  <script>
    document.documentElement.classList.toggle("card-embed", /[?&]embed=1(?:&|$)/.test(location.search));
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VOA - Cartão de Visita (impressão)</title>
  <!-- Brand tokens align with site css/tokens.css; logo lives under website assets -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /*
      Trim: 85 × 55 mm (ISO / EU business card)
      Bleed: 10 mm each side → file 105 × 75 mm per side
      Safe text: 7 mm inside trim (17 mm from sheet edge)
    */
    :root {
      --navy: #0D1B2A;
      --navy-footer: #081522;
      /* Brand kit */
      --accent: #5fa8dc;
      --accent-light: #89c5ea;
      --accent-logo: #5fa8dc;
      --muted: #566475;
      --bg: #F7F9FB;
      --white: #ffffff;
      --body-sales: #3a4a5a;
      --bleed-mm: 10;
      --trim-w-mm: 85;
      --trim-h-mm: 55;
      --page-w-mm: calc(var(--trim-w-mm) + 2 * var(--bleed-mm));
      --page-h-mm: calc(var(--trim-h-mm) + 2 * var(--bleed-mm));
      --safe-inset-mm: 17; /* bleed + inner safe */
      --trim-box-z: 10000; /* linha de corte por cima de todo o conteúdo da folha */
    }

    @page {
      size: 105mm 75mm;
      margin: 0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #999;
    }

    .sheet {
      width: 105mm;
      height: 75mm;
      position: relative;
      page-break-after: always;
      overflow: hidden;
    }

    .sheet:last-child {
      page-break-after: auto;
    }

    .trim-box {
      position: absolute;
      inset: 10mm;
      box-sizing: border-box;
      border: 0.12mm dashed rgba(255, 255, 255, 0.28);
      pointer-events: none;
      z-index: var(--trim-box-z);
    }

    .sheet--back .trim-box {
      border-color: rgba(35, 35, 35, 0.45);
      z-index: var(--trim-box-z);
    }

    /* Front: navy + accent gradient (aligned with site / sales deck) */
    .sheet--front {
      background: var(--navy);
      color: var(--white);
    }

    .sheet--front::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 130% 85% at 100% 0%, rgba(95, 168, 220, 0.28) 0%, transparent 58%),
        radial-gradient(ellipse 95% 75% at 0% 100%, rgba(137, 197, 234, 0.14) 0%, transparent 52%),
        radial-gradient(ellipse 70% 50% at 50% 50%, rgba(255, 255, 255, 0.04) 0%, transparent 65%),
        linear-gradient(155deg, var(--navy) 0%, var(--navy-footer) 100%);
      pointer-events: none;
    }

    .front-inner {
      position: relative;
      z-index: 3;
      height: 100%;
      padding: 17mm;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    /* Frente: bloco de marca alinhado com cartões de acesso (logo + tagline) */
    .brand-block--visitor-front {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      width: 100%;
      gap: 2.75mm;
    }

    .brand-block--visitor-front .brand-logo img {
      display: block;
      height: 11mm;
      width: auto;
      max-width: 52mm;
      margin-left: auto;
      margin-right: auto;
      object-fit: contain;
      object-position: center center;
      filter: drop-shadow(0 0.15mm 0.45mm rgba(0, 0, 0, 0.5))
        drop-shadow(0 0 0.35mm rgba(95, 168, 220, 0.35));
    }

    .brand-block--visitor-front .brand-sub {
      font-size: 3.85mm;
      font-weight: 500;
      letter-spacing: -0.025em;
      line-height: 1.25;
      color: var(--accent-logo);
      max-width: 72mm;
      margin: 0;
      text-align: center;
    }

    /* Back: solid white (no background gradients) */
    .sheet--back {
      background: #ffffff;
      color: var(--navy);
    }

    .back-inner {
      position: relative;
      z-index: 3;
      height: 100%;
      padding: 17mm;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .back-top {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 3.25mm;
      width: 100%;
    }

    .back-name-block {
      flex: 1;
      min-width: 0;
    }

    /* Fotografia opcional (verso) — mesma mecânica que photo-embed.js nos cartões de acesso */
    .visitor-photo.photo-wrap {
      flex-shrink: 0;
      margin: 0;
      width: 14mm;
      height: 18.67mm;
      border: 0.35mm solid rgba(13, 27, 42, 0.14);
      border-radius: 1mm;
      overflow: hidden;
      background: #f0f3f7;
    }

    .visitor-photo .photo-viewport {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
    }

    .visitor-photo .photo-user-img {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      max-width: none;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .visitor-photo .photo-user-img.is-dragging {
      cursor: grabbing;
    }

    .visitor-photo .photo-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2mm;
      font-weight: 500;
      color: var(--muted);
      text-align: center;
      padding: 1.5mm;
      line-height: 1.35;
      pointer-events: none;
      z-index: 1;
    }

    html.card-embed .visitor-photo.card-embed--has-photo .photo-placeholder {
      display: none;
    }

    html.card-embed .visitor-photo .photo-viewport {
      cursor: grab;
    }

    html.card-embed .visitor-photo .photo-viewport:active {
      cursor: grabbing;
    }

    .back-name {
      font-size: 5.2mm;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.15;
      color: var(--navy);
    }

    .back-title {
      margin-top: 1.25mm;
      font-size: 2.85mm;
      font-weight: 500;
      color: var(--muted);
      line-height: 1.3;
    }

    .rule-accent {
      width: 100%;
      max-width: 48mm;
      height: 1.15mm;
      background: linear-gradient(
        90deg,
        var(--accent-light) 0%,
        var(--accent) 28%,
        #1a4a6e 72%,
        var(--navy) 100%
      );
      border-radius: 0.65mm;
      margin: 2.5mm 0 2.25mm;
      box-shadow: 0 0.35mm 1.2mm rgba(95, 168, 220, 0.15);
    }

    /* Espaço entre cabeçalho (foto + nome) e linha do email em diante */
    .back-contact {
      font-size: 2.5mm;
      line-height: 1.55;
      color: var(--body-sales);
      margin-top: 3.75mm;
    }

    .back-contact a {
      color: var(--navy);
      text-decoration: none;
    }

    .back-row {
      display: flex;
      gap: 1.5mm;
      align-items: flex-start;
      margin-bottom: 1.1mm;
    }

    .back-row:last-child {
      margin-bottom: 0;
    }

    .back-icon {
      width: 3mm;
      height: 3mm;
      flex-shrink: 0;
      margin-top: 0.35mm;
      color: var(--muted);
    }

    .back-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2mm;
      padding-top: 2mm;
      border-top: 0.35mm solid rgba(13, 27, 42, 0.1);
    }

    .back-footer-logo {
      height: 6.5mm;
      width: auto;
      max-width: 30mm;
      object-fit: contain;
      object-position: left center;
      flex-shrink: 0;
    }

    .back-web {
      font-size: 2.65mm;
      font-weight: 600;
      color: var(--navy);
      text-decoration: none;
      flex-shrink: 0;
      text-align: right;
    }

    /* Optional: faint trim guide for proofing  -  hidden when printing if undesired */
    .trim-guide {
      display: none;
    }

    @media print {
      html,
      body {
        width: 105mm;
        margin: 0;
        padding: 0;
        background: #fff;
      }

      body {
        display: block;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .sheet {
        box-shadow: none;
        margin: 0;
        page-break-after: always;
        break-after: page;
      }

      .sheet:last-child {
        page-break-after: auto;
        break-after: auto;
      }

      .trim-box {
        border-color: rgba(0, 0, 0, 0.4);
        z-index: var(--trim-box-z);
      }

      .sheet--back .trim-box {
        border-color: rgba(35, 35, 35, 0.45);
        z-index: var(--trim-box-z);
      }
    }

    @media screen {
      .trim-box {
        opacity: 0.4;
        z-index: var(--trim-box-z);
      }

      html {
        width: auto;
        min-height: 100%;
      }

      body {
        width: auto;
        min-height: 100vh;
        padding: 12mm;
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        align-content: center;
        justify-content: safe center;
        gap: 8mm;
        box-sizing: border-box;
        overflow-x: hidden;
      }

      .sheet {
        width: 105mm;
        height: 75mm;
        min-width: 105mm;
        max-width: 105mm;
        min-height: 75mm;
        max-height: 75mm;
        flex-shrink: 0;
        box-shadow: 0 4mm 12mm rgba(13, 27, 42, 0.2);
        margin-bottom: 0;
      }
    }
  </style>
  <link rel="stylesheet" href="cards-export.css" />
  <script src="cards-export.js" defer></script>
  <script src="card-embed-fields.js" defer></script>
  <script src="photo-embed.js" defer></script>
</head>
<body class="card-export-page">

    <button type="button" class="card-export-print">Imprimir</button>
    <a class="card-export-pdf" href="visitor-card-print.pdf" download>Descarregar PDF</a>
    <a
      class="card-export-psd"
      href="visitor-card-300dpi.psd"
      download
      title="Gere o ficheiro com: python export_cards_to_psd.py"
    >Descarregar PSD</a>
  </div>
  <!-- Front -->
  <section class="sheet sheet--front" aria-label="Cartão de Visita - frente">

      <div class="brand-block brand-block--visitor-front">

          <img
            src="logo.png"
            alt="VOA logo"
            width="220"
            height="40"
            decoding="async"
          />

        <div class="brand-sub" data-card-field="visitorFront">Beyond simulation.</div>
      </div>
    </div>
    <div class="trim-box" aria-hidden="true"></div>
  </section>

  <!-- Verso - editar nome, cargo e contactos antes de gerar o PDF -->
  <section class="sheet sheet--back" aria-label="Cartão de Visita - verso">

            </div>
          </div>
          <div class="back-name-block">
            <div class="back-name" data-card-field="backName">Miguel Figueiredo</div>
            <div class="back-title" data-card-field="backTitle">CEO</div>
            <div class="rule-accent" aria-hidden="true"></div>
          </div>
        </div>
        <div class="back-contact">
          <div class="back-row">
            <svg class="back-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M4 6.75A2.25 2.25 0 016.25 4.5h11.5A2.25 2.25 0 0120 6.75v10.5A2.25 2.25 0 0117.75 19.5H6.25A2.25 2.25 0 014 17.25V6.75z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
              <path d="M4.5 7.5l7.2 5.4a1.5 1.5 0 001.8 0l7.2-5.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <span><a href="mailto:miguel.figueiredo@voa.aero" data-card-field="email">miguel.figueiredo@voa.aero</a></span>
          </div>
          <div class="back-row">
            <svg class="back-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M22 16.92v3a2 2 0 01-2.18 2 19.8 19.8 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.8 19.8 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0022 16.92z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span><a href="tel:+351227662812" data-card-field="phone">(+351) 227 662 812</a></span>
          </div>
          <div class="back-row">
            <svg class="back-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M12 21s7-4.35 7-11a7 7 0 10-14 0c0 6.65 7 11 7 11z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
              <circle cx="12" cy="10" r="2.25" stroke="currentColor" stroke-width="1.5"/>
            </svg>
            <span data-card-field="address">R. Narciso Machado 142, 4475-250 Maia, Portugal</span>
          </div>
        </div>
      </div>
      <div class="back-footer">
        <img
          class="back-footer-logo"
          src="logo.png"
          alt="Logo"
          width="160"
          height="40"
          decoding="async"
        />

      </div>
    </div>
    <div class="trim-box" aria-hidden="true"></div>
  </section>
</body>
</html>
