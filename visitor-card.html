<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VOA.aero  -  Visitor card (print)</title>
  <!-- Brand tokens align with site css/tokens.css; logo lives under website assets -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /*
      Trim: 85 × 55 mm (ISO / EU business card)
      Bleed: 10 mm each side → file 105 × 75 mm per side
      Safe text: 7 mm inside trim (17 mm from sheet edge)
    */
    :root {
      --navy: #0D1B2A;
      --navy-footer: #081522;
      --accent: #00A8FF;
      --accent-light: #00C8FF;
      --muted: #566475;
      --bg: #F7F9FB;
      --white: #ffffff;
      --body-sales: #3a4a5a;
      --bleed-mm: 10;
      --trim-w-mm: 85;
      --trim-h-mm: 55;
      --page-w-mm: calc(var(--trim-w-mm) + 2 * var(--bleed-mm));
      --page-h-mm: calc(var(--trim-h-mm) + 2 * var(--bleed-mm));
      --safe-inset-mm: 17; /* bleed + inner safe */
    }

    @page {
      size: 105mm 75mm;
      margin: 0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #999;
    }

    .sheet {
      width: 105mm;
      height: 75mm;
      position: relative;
      page-break-after: always;
      overflow: hidden;
    }

    .sheet:last-child {
      page-break-after: auto;
    }

    .trim-box {
      position: absolute;
      inset: 10mm;
      box-sizing: border-box;
      border: 0.12mm dashed rgba(255, 255, 255, 0.28);
      pointer-events: none;
      z-index: 2;
    }

    .sheet--back .trim-box {
      border-color: rgba(35, 35, 35, 0.45);
    }

    /* Front: navy + accent gradient (aligned with site / sales deck) */
    .sheet--front {
      background: var(--navy);
      color: var(--white);
    }

    .sheet--front::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 130% 85% at 100% 0%, rgba(0, 168, 255, 0.28) 0%, transparent 58%),
        radial-gradient(ellipse 95% 75% at 0% 100%, rgba(0, 200, 255, 0.14) 0%, transparent 52%),
        radial-gradient(ellipse 70% 50% at 50% 50%, rgba(255, 255, 255, 0.04) 0%, transparent 65%),
        linear-gradient(155deg, var(--navy) 0%, var(--navy-footer) 100%);
      pointer-events: none;
    }

    .front-inner {
      position: relative;
      z-index: 3;
      height: 100%;
      padding: 17mm;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* Frente escura: voa-wordmark-light.svg · Verso claro: logo.png (wordmark azul do site) */
    .front-logo {
      display: block;
      margin-bottom: 3.5mm;
    }

    .front-logo img {
      display: block;
      height: 11mm;
      width: auto;
      max-width: 52mm;
      object-fit: contain;
      object-position: left center;
    }

    .front-beyond {
      font-size: 5.25mm;
      font-weight: 700;
      letter-spacing: -0.035em;
      line-height: 1.2;
      color: var(--white);
      max-width: 72mm;
    }

    .front-beyond-highlight {
      color: var(--accent);
    }

    /* Back: solid white (no background gradients) */
    .sheet--back {
      background: #ffffff;
      color: var(--navy);
    }

    .back-inner {
      position: relative;
      z-index: 3;
      height: 100%;
      padding: 17mm;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .back-name {
      font-size: 5.2mm;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.15;
      color: var(--navy);
    }

    .back-title {
      margin-top: 1.25mm;
      font-size: 2.85mm;
      font-weight: 500;
      color: var(--muted);
      line-height: 1.3;
    }

    .rule-accent {
      width: 100%;
      max-width: 48mm;
      height: 1.15mm;
      background: linear-gradient(
        90deg,
        var(--accent-light) 0%,
        var(--accent) 28%,
        #1a4a6e 72%,
        var(--navy) 100%
      );
      border-radius: 0.65mm;
      margin: 2.5mm 0 2.25mm;
      box-shadow: 0 0.35mm 1.2mm rgba(0, 168, 255, 0.15);
    }

    .back-contact {
      font-size: 2.5mm;
      line-height: 1.55;
      color: var(--body-sales);
    }

    .back-contact a {
      color: var(--navy);
      text-decoration: none;
    }

    .back-row {
      display: flex;
      gap: 1.5mm;
      align-items: flex-start;
      margin-bottom: 1.1mm;
    }

    .back-row:last-child {
      margin-bottom: 0;
    }

    .back-icon {
      width: 3mm;
      height: 3mm;
      flex-shrink: 0;
      margin-top: 0.35mm;
      color: var(--muted);
    }

    .back-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 3mm;
      padding-top: 2mm;
      border-top: 0.35mm solid rgba(13, 27, 42, 0.1);
    }

    .back-footer-logo {
      height: 6.5mm;
      width: auto;
      max-width: 28mm;
      object-fit: contain;
      object-position: left center;
      flex-shrink: 0;
    }

    .back-footer-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.9mm;
      text-align: right;
      min-width: 0;
    }

    .back-web {
      font-size: 2.65mm;
      font-weight: 600;
      color: var(--navy);
      text-decoration: none;
    }

    /* Optional: faint trim guide for proofing  -  hidden when printing if undesired */
    .trim-guide {
      display: none;
    }

    @media print {
      html,
      body {
        width: 105mm;
        margin: 0;
        padding: 0;
        background: #fff;
      }

      body {
        display: block;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .sheet {
        box-shadow: none;
        margin: 0;
        page-break-after: always;
        break-after: page;
      }

      .sheet:last-child {
        page-break-after: auto;
        break-after: auto;
      }

      .trim-box {
        border-color: rgba(0, 0, 0, 0.4);
      }

      .sheet--back .trim-box {
        border-color: rgba(35, 35, 35, 0.45);
      }
    }

    @media screen {
      .trim-box {
        opacity: 0.4;
      }

      html {
        width: auto;
        min-height: 100%;
      }

      body {
        width: auto;
        min-height: 100vh;
        padding: 12mm;
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        align-items: center;
        justify-content: safe center;
        gap: 8mm;
        box-sizing: border-box;
        overflow-x: auto;
      }

      .sheet {
        flex-shrink: 0;
        box-shadow: 0 4mm 12mm rgba(13, 27, 42, 0.2);
        margin-bottom: 0;
      }
    }
  </style>
