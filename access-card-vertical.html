<!DOCTYPE html>
<html lang="pt">
<head>
  <script>
    document.documentElement.classList.toggle("card-embed", /[?&]embed=1(?:&|$)/.test(location.search));
  </script>
  <meta charset="UTF-8" />
  <title>VOA - Cartão de Acesso Vertical (impressão)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /*
      VERTICAL · Sangria 10 mm · Zona segura 17 mm da borda da folha (10 bleed + 7 mm para dentro do corte)
      Folha: 74 × 105,6 mm · Trim: 54 × 85,6 mm
    */
    :root {
      --navy: #0d1b2a;
      --navy-footer: #081522;
      --accent: #5fa8dc;
      --accent-light: #89c5ea;
      --accent-logo: #5fa8dc;
      --muted: #566475;
      --bg: #f7f9fb;
      --white: #ffffff;
      --bleed: 10mm;
      --edge-inset: 17mm;
      --print-w: 74mm;
      --print-h: 105.6mm;
      --inner-pad-top: var(--edge-inset);
      --inner-h: var(--print-h);
      --safe-inner-w: 40mm;
      --trim-box-z: 2147483647;
    }

    @page {
      size: 74mm 105.6mm;
      margin: 0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      width: var(--print-w);
    }

    body {
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #888;
      width: var(--print-w);
    }

    .sheet {
      width: var(--print-w);
      height: var(--print-h);
      min-width: var(--print-w);
      max-width: var(--print-w);
      min-height: var(--print-h);
      max-height: var(--print-h);
      position: relative;
      page-break-after: always;
      overflow: hidden;
      background: var(--white);
      color: var(--navy);
    }

    .card-embed-preview-unit:last-child .sheet {
      page-break-after: auto;
    }

    .trim-box {
      position: absolute;
      inset: var(--bleed);
      box-sizing: border-box;
      border: 0.12mm dashed rgba(13, 27, 42, 0.62);
      pointer-events: none;
      z-index: var(--trim-box-z);
      isolation: isolate;
    }

    .sheet--front .trim-box::after {
      content: "";
      position: absolute;
      inset: 0;
      box-sizing: border-box;
      border: 0.12mm dashed rgba(255, 255, 255, 0.82);
      pointer-events: none;
      z-index: 1;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .sheet--front {
      display: flex;
      flex-direction: column;
    }

    .inner {
      position: relative;
      width: var(--print-w);
      height: var(--inner-h);
      min-height: var(--inner-h);
      max-height: var(--inner-h);
      padding: var(--inner-pad-top) var(--edge-inset) var(--edge-inset);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      flex-shrink: 0;
    }

    .sheet--front .brand-block {
      flex-shrink: 0;
      align-self: center;
      width: 100%;
      max-width: 100%;
    }

    .brand-block {
      display: flex;
      flex-direction: column;
      gap: 2.75mm;
      align-items: center;
      text-align: center;
    }

    .brand-logo img {
      display: block;
      height: 9.5mm;
      width: auto;
      max-width: 45mm;
      object-fit: contain;
    }

    /* Slogan só na capa escura (.sheet--back); lado dados (.sheet--front) sem tagline */
    /* Mesma proporção tipográfica que access horizontal (capa .back-brand .brand-sub) */
    .sheet--back .back-brand .brand-sub {
      font-size: 3.65mm;
      font-weight: 500;
      letter-spacing: -0.025em;
      line-height: 1.25;
      color: var(--accent-logo);
      margin: 0;
      text-align: center;
      max-width: 56mm;
      flex-shrink: 0;
    }

    .sheet--front .brand-photo-gap {
      flex-shrink: 0;
      height: 8mm;
      width: 100%;
    }

    .photo-wrap {
      align-self: center;
      margin-top: 0;
      width: 20mm;
      height: 26.67mm;
      border: 0.35mm solid rgba(13, 27, 42, 0.12);
      border-radius: 1mm;
      overflow: hidden;
      background: var(--bg);
      flex-shrink: 0;
    }

    .photo-wrap .photo-viewport {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
    }

    .photo-wrap .photo-user-img {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      max-width: none;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .photo-wrap .photo-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.85mm;
      color: var(--muted);
      text-align: center;
      padding: 1.5mm;
      line-height: 1.35;
      pointer-events: none;
      z-index: 1;
    }

    html.card-embed .photo-wrap.card-embed--has-photo .photo-placeholder {
      display: none;
    }

    html.card-embed .photo-wrap .photo-viewport {
      cursor: grab;
    }

    html.card-embed .photo-wrap .photo-viewport:active {
      cursor: grabbing;
    }

    /* Folga fixa até à faixa — sem flex-grow, para a faixa subir (espaço livre fica abaixo da faixa) */
    .role-to-band-spacer {
      flex: 0 0 auto;
      height: 5.5mm;
      min-height: 5.5mm;
      width: 100%;
    }

    .data-band {
      flex-shrink: 0;
      margin-left: calc(-1 * var(--edge-inset));
      margin-right: calc(-1 * var(--edge-inset));
      padding: 2.2mm var(--edge-inset) 2.4mm;
      /* Marine blue — same as deck front slide / site tokens (--navy #0D1B2A) */
      background: var(--navy);
      position: relative;
      color: var(--white);
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .data-grid {
      display: grid;
      gap: 1.2mm;
    }

    .data-row {
      display: grid;
      grid-template-columns: 12mm minmax(0, 1fr);
      align-items: stretch;
      gap: 1.2mm;
      font-size: 2.15mm;
    }

    .data-label {
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--white);
      display: flex;
      align-items: center;
      padding: 0.6mm 0;
      font-size: 1.85mm;
    }

    .data-value {
      background: transparent;
      color: var(--white);
      font-weight: 600;
      letter-spacing: 0.01em;
      padding: 0.9mm 0;
      border-radius: 0;
      border: none;
      box-shadow: none;
      min-height: 4.85mm;
      display: flex;
      align-items: center;
      font-size: 2.05mm;
      word-break: break-word;
    }

    .data-value--mono {
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.05em;
    }

    .band-footer {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.65mm;
      margin-top: 1.4mm;
      padding-top: 1.2mm;
      border-top: 0.25mm solid rgba(255, 255, 255, 0.35);
    }

    .band-site {
      font-size: 2.15mm;
      font-weight: 600;
      color: var(--white);
      letter-spacing: 0.03em;
    }

    .band-mark {
      font-size: 1.75mm;
      color: var(--white);
      font-weight: 500;
      line-height: 1.3;
    }

    .sheet--back {
      position: relative;
      background: var(--navy);
      color: var(--white);
    }

    .sheet--back::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 130% 85% at 100% 0%, rgba(95, 168, 220, 0.28) 0%, transparent 58%),
        radial-gradient(ellipse 95% 75% at 0% 100%, rgba(137, 197, 234, 0.14) 0%, transparent 52%),
        radial-gradient(ellipse 70% 50% at 50% 50%, rgba(255, 255, 255, 0.04) 0%, transparent 65%),
        linear-gradient(155deg, var(--navy) 0%, var(--navy-footer) 100%);
      pointer-events: none;
    }

    .sheet--back .trim-box {
      border-color: rgba(255, 255, 255, 0.82);
      z-index: var(--trim-box-z);
    }

    .back-inner {
      position: relative;
      z-index: 2;
      width: var(--print-w);
      height: var(--print-h);
      min-height: var(--print-h);
      max-height: var(--print-h);
      padding: var(--edge-inset);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .back-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.75mm;
      flex-shrink: 0;
    }

    /* Mesmo logo.png que a frente: azul brand sobre fundo escuro (+ sombra suave para contraste) */
    .back-logo {
      display: block;
      width: auto;
      max-width: 100%;
      height: auto;
      max-height: 12mm;
      object-fit: contain;
      object-position: center center;
      filter: drop-shadow(0 0.15mm 0.5mm rgba(0, 0, 0, 0.55))
        drop-shadow(0 0 0.4mm rgba(95, 168, 220, 0.4));
    }

    @media print {
      html,
      body {
        width: 74mm;
        margin: 0;
        padding: 0;
        background: #fff;
      }

      body {
        display: block;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .sheet {
        box-shadow: none;
        margin: 0;
        page-break-after: always;
        break-after: page;
      }

      .card-embed-preview-unit:last-child .sheet {
        page-break-after: auto;
        break-after: auto;
      }

      .trim-box {
        border-color: rgba(13, 27, 42, 0.72);
        z-index: var(--trim-box-z);
      }

      .sheet--back .trim-box {
        border-color: rgba(255, 255, 255, 0.88);
        z-index: var(--trim-box-z);
      }
    }

    @media screen {
      .sheet--front .trim-box {
        border-color: rgba(13, 27, 42, 0.58);
        opacity: 1;
        z-index: var(--trim-box-z);
      }

      .sheet--back .trim-box {
        border-color: rgba(255, 255, 255, 0.78);
        opacity: 1;
        z-index: var(--trim-box-z);
      }

      html {
        width: auto;
        min-height: 100%;
      }

      body {
        width: auto;
        min-height: 100vh;
        padding: 10mm;
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        align-content: center;
        justify-content: safe center;
        gap: 8mm;
        box-sizing: border-box;
        overflow-x: hidden;
      }

      .sheet {
        width: 74mm;
        height: 105.6mm;
        min-width: 74mm;
        max-width: 74mm;
        min-height: 105.6mm;
        max-height: 105.6mm;
        flex-shrink: 0;
        box-shadow: 0 3mm 10mm rgba(13, 27, 42, 0.25);
        margin-bottom: 0;
      }
    }
  </style>
  <link rel="stylesheet" href="cards-export.css" />
  <script src="cards-export.js" defer></script>
  <script src="card-embed-fields.js" defer></script>
  <script src="photo-embed.js" defer></script>
</head>
<body class="card-export-page">
  <div class="card-export-bar" role="toolbar" aria-label="Exportar">
    <span class="card-export-title">Cartão de Acesso Vertical</span>
    <button type="button" class="card-export-print">Imprimir</button>
    <a class="card-export-pdf" href="access-card-vertical-print.pdf" download>Descarregar PDF</a>
    <a
      class="card-export-psd"
      href="access-card-vertical-300dpi.psd"
      download
      title="Gere o ficheiro com: python export_cards_to_psd.py"
    >Descarregar PSD</a>
  </div>
  <!-- Capa primeiro (como cartão de visita); dados no 2.º lado -->
  <div class="card-embed-preview-unit">
    <p class="card-embed-face-tag" aria-hidden="true">Front</p>
    <section class="sheet sheet--back" aria-label="Cartão de Acesso Vertical - capa">
      <div class="back-inner">
        <div class="back-brand">
          <img
            class="back-logo"
            src="logo.png"
            alt="VOA logo"
            width="160"
            height="40"
            decoding="async"
          />
          <div class="brand-sub" data-card-field="brandSub">Beyond simulation.</div>
        </div>
      </div>
      <div class="trim-box" aria-hidden="true"></div>
    </section>
  </div>

  <div class="card-embed-preview-unit">
    <p class="card-embed-face-tag" aria-hidden="true">Back</p>
    <section class="sheet sheet--front" aria-label="Cartão de Acesso Vertical - dados">
      <div class="inner">
        <div class="brand-block">
          <div class="brand-logo">
            <img
              src="logo.png"
              alt="VOA logo"
              width="160"
              height="40"
              decoding="async"
            />
          </div>
        </div>

        <div class="brand-photo-gap" aria-hidden="true"></div>

        <div class="photo-wrap" aria-label="Fotografia">
          <div class="photo-viewport">
            <img class="photo-user-img" alt="" decoding="async" />
            <div class="photo-placeholder">
              Foto<br />3 × 4 cm
            </div>
          </div>
        </div>

        <div class="role-to-band-spacer" aria-hidden="true"></div>

        <div class="data-band">
          <div class="data-grid">
            <div class="data-row">
              <span class="data-label">Nome</span>
              <span class="data-value" data-card-field="bandUpperName">Miguel Figueiredo</span>
            </div>
            <div class="data-row">
              <span class="data-label">Função</span>
              <span class="data-value" data-card-field="role">CEO</span>
            </div>
            <div class="data-row">
              <span class="data-label">ID / N.º</span>
              <span class="data-value data-value--mono" data-card-field="idNumber">VOA-2026-00000</span>
            </div>
          </div>
          <div class="band-footer">
            <span class="band-site" data-card-field="bandSite">www.voa.aero</span>
            <span class="band-mark" data-card-field="bandMark">Cartão de Acesso · não transferível</span>
          </div>
        </div>
      </div>
      <div class="trim-box" aria-hidden="true"></div>
    </section>
  </div>
</body>
</html>
