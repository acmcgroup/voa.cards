<!DOCTYPE html>
<html lang="pt">
<head>
  <script>
    document.documentElement.classList.toggle("card-embed", /[?&]embed=1(?:&|$)/.test(location.search));
  </script>
  <meta charset="UTF-8" />
  <title>VOA - Cartão de Acesso Horizontal (impressão)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /*
      HORIZONTAL · Sangria 10 mm · Zona segura 17 mm da borda (10 bleed + 7 mm dentro do corte)
      Folha: 105,6 × 74 mm · Trim: 85,6 × 54 mm
    */
    :root {
      --navy: #0d1b2a;
      --navy-footer: #081522;
      --accent: #5fa8dc;
      --accent-light: #89c5ea;
      --accent-logo: #5fa8dc;
      --muted: #566475;
      --bg: #f7f9fb;
      --white: #ffffff;
      --bleed: 10mm;
      /* 17 mm da borda da folha = sangria + 7 mm para dentro do corte */
      --edge-inset: 17mm;
      --print-w: 105.6mm;
      --print-h: 74mm;
      --inner-pad-top: var(--edge-inset);
      --inner-h: var(--print-h);
      --safe-inner-w: 71.6mm;
      /* Valor alto + isolamento: PDF/Chromium por vezes empilha mal se .inner também tem z-index */
      --trim-box-z: 2147483647;
    }

    @page {
      size: 105.6mm 74mm;
      margin: 0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      width: var(--print-w);
    }

    body {
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #888;
      width: var(--print-w);
    }

    .sheet {
      width: var(--print-w);
      height: var(--print-h);
      min-width: var(--print-w);
      max-width: var(--print-w);
      min-height: var(--print-h);
      max-height: var(--print-h);
      position: relative;
      page-break-after: always;
      overflow: hidden;
      background: var(--white);
      color: var(--navy);
    }

    .card-embed-preview-unit:last-child .sheet {
      page-break-after: auto;
    }

    .trim-box {
      position: absolute;
      inset: var(--bleed);
      box-sizing: border-box;
      border: 0.12mm dashed rgba(13, 27, 42, 0.62);
      pointer-events: none;
      z-index: var(--trim-box-z);
    }

    /*
     * Lado claro + faixa escura: o tracejado escuro some sobre o navy.
     * Camada clara (por cima) mantém contraste na faixa; nos vãos vê-se o escuro no fundo branco.
     */
    .sheet--front .trim-box::after {
      content: "";
      position: absolute;
      inset: 0;
      box-sizing: border-box;
      border: 0.12mm dashed rgba(255, 255, 255, 0.82);
      pointer-events: none;
      z-index: 1;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .sheet--front {
      display: flex;
      flex-direction: column;
    }

    .inner {
      position: relative;
      width: var(--print-w);
      height: var(--inner-h);
      min-height: var(--inner-h);
      max-height: var(--inner-h);
      padding: var(--inner-pad-top) var(--edge-inset) var(--edge-inset);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      flex-shrink: 0;
    }

    /* Lado dados: menos padding vertical (15 mm) para caber foto + faixa acima do corte sem clip */
    .sheet--front .inner {
      padding-top: 15mm;
      padding-bottom: 15mm;
    }

    .front-row {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: flex-start;
      gap: 3mm;
      /* Só a altura do conteúdo — evita colapso que sobrepõe a faixa à foto */
      flex: 0 0 auto;
      min-height: min-content;
    }

    .front-row-left {
      flex: 1 1 auto;
      min-width: 0;
      min-height: min-content;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      text-align: left;
    }

    .sheet--front .brand-block {
      flex-shrink: 0;
      min-width: 0;
      max-width: 100%;
    }

    .brand-block {
      display: flex;
      flex-direction: column;
      gap: 2.35mm;
      align-items: flex-start;
      text-align: left;
    }

    .brand-logo img {
      display: block;
      height: 5mm;
      width: auto;
      max-width: 40mm;
      object-fit: contain;
    }

    .sheet--back .back-brand .brand-sub {
      font-size: 3.25mm;
      font-weight: 500;
      letter-spacing: -0.025em;
      line-height: 1.25;
      color: var(--accent-logo);
      margin: 0;
      text-align: center;
      max-width: 56mm;
      flex-shrink: 0;
    }

    /* Espaço flexível entre foto e faixa; pode ir a 0 se a folha estiver apertada */
    .role-to-band-spacer {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
    }

    .photo-wrap {
      flex-shrink: 0;
      width: 13.5mm;
      height: 18mm;
      border: 0.35mm solid rgba(13, 27, 42, 0.12);
      border-radius: 1mm;
      overflow: hidden;
      background: var(--bg);
    }

    .photo-wrap .photo-viewport {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
    }

    .photo-wrap .photo-user-img {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      max-width: none;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .photo-wrap .photo-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75mm;
      color: var(--muted);
      text-align: center;
      padding: 1.2mm;
      line-height: 1.35;
      pointer-events: none;
      z-index: 1;
    }

    html.card-embed .photo-wrap.card-embed--has-photo .photo-placeholder {
      display: none;
    }

    html.card-embed .photo-wrap .photo-viewport {
      cursor: grab;
    }

    html.card-embed .photo-wrap .photo-viewport:active {
      cursor: grabbing;
    }

    .data-band {
      flex-shrink: 0;
      margin-left: calc(-1 * var(--edge-inset));
      margin-right: calc(-1 * var(--edge-inset));
      padding: 1.4mm var(--edge-inset) 1.4mm;
      background: linear-gradient(
        165deg,
        var(--navy) 0%,
        var(--navy-footer) 55%,
        #0a1520 100%
      );
      position: relative;
    }

    .data-band::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 0.35mm;
      background: linear-gradient(
        90deg,
        var(--accent-light) 0%,
        var(--accent) 40%,
        transparent 88%
      );
      opacity: 0.9;
    }

    .data-grid {
      display: grid;
      gap: 0.75mm;
    }

    .data-row {
      display: grid;
      grid-template-columns: 11mm minmax(0, 1fr);
      align-items: stretch;
      gap: 1mm;
      font-size: 1.95mm;
    }

    .data-label {
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
      display: flex;
      align-items: center;
      padding: 0.3mm 0;
      font-size: 1.65mm;
    }

    .data-value {
      background: rgba(255, 255, 255, 0.97);
      color: var(--navy);
      font-weight: 600;
      letter-spacing: 0.01em;
      padding: 0.55mm 1mm;
      border-radius: 0.5mm;
      border: 0.2mm solid rgba(95, 168, 220, 0.25);
      box-shadow: 0 0.2mm 0.55mm rgba(0, 0, 0, 0.1);
      min-height: 3.65mm;
      display: flex;
      align-items: center;
      font-size: 1.85mm;
      word-break: break-word;
    }

    .data-value--mono {
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.05em;
    }

    .band-footer {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: flex-end;
      gap: 1.2mm;
      margin-top: 0.75mm;
      padding-top: 0.75mm;
      border-top: 0.2mm solid rgba(255, 255, 255, 0.1);
    }

    .band-site {
      font-size: 1.85mm;
      font-weight: 600;
      color: var(--accent-light);
      letter-spacing: 0.03em;
    }

    .band-mark {
      font-size: 1.55mm;
      color: rgba(255, 255, 255, 0.38);
      font-weight: 500;
      line-height: 1.25;
      text-align: right;
    }

    .sheet--back {
      position: relative;
      background: var(--navy);
      color: var(--white);
    }

    .sheet--back::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 130% 85% at 100% 0%, rgba(95, 168, 220, 0.28) 0%, transparent 58%),
        radial-gradient(ellipse 95% 75% at 0% 100%, rgba(137, 197, 234, 0.14) 0%, transparent 52%),
        radial-gradient(ellipse 70% 50% at 50% 50%, rgba(255, 255, 255, 0.04) 0%, transparent 65%),
        linear-gradient(155deg, var(--navy) 0%, var(--navy-footer) 100%);
      pointer-events: none;
    }

    .sheet--back .trim-box {
      border-color: rgba(255, 255, 255, 0.82);
      z-index: var(--trim-box-z);
    }

    .back-inner {
      position: relative;
      z-index: 2;
      width: var(--print-w);
      height: var(--print-h);
      min-height: var(--print-h);
      max-height: var(--print-h);
      padding: var(--edge-inset);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .back-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.75mm;
      flex-shrink: 0;
    }

    .back-logo {
      display: block;
      width: auto;
      max-width: 100%;
      height: auto;
      max-height: 11mm;
      object-fit: contain;
      object-position: center center;
      filter: drop-shadow(0 0.12mm 0.45mm rgba(0, 0, 0, 0.5))
        drop-shadow(0 0 0.35mm rgba(95, 168, 220, 0.35));
    }

    @media print {
      html,
      body {
        width: 105.6mm;
        margin: 0;
        padding: 0;
        background: #fff;
      }

      body {
        display: block;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .sheet {
        box-shadow: none;
        margin: 0;
        page-break-after: always;
        break-after: page;
      }

      .card-embed-preview-unit:last-child .sheet {
        page-break-after: auto;
        break-after: auto;
      }

      .trim-box {
        border-color: rgba(13, 27, 42, 0.72);
        z-index: var(--trim-box-z);
      }

      .sheet--back .trim-box {
        border-color: rgba(255, 255, 255, 0.88);
        z-index: var(--trim-box-z);
      }
    }

    @media screen {
      .sheet--front .trim-box {
        border-color: rgba(13, 27, 42, 0.58);
        opacity: 1;
        z-index: var(--trim-box-z);
      }

      .sheet--back .trim-box {
        border-color: rgba(255, 255, 255, 0.78);
        opacity: 1;
        z-index: var(--trim-box-z);
      }

      html {
        width: auto;
        min-height: 100%;
      }

      body {
        width: auto;
        min-height: 100vh;
        padding: 10mm;
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        align-content: center;
        justify-content: safe center;
        gap: 8mm;
        box-sizing: border-box;
        overflow-x: hidden;
      }

      .sheet {
        width: 105.6mm;
        height: 74mm;
        min-width: 105.6mm;
        max-width: 105.6mm;
        min-height: 74mm;
        max-height: 74mm;
        flex-shrink: 0;
        box-shadow: 0 3mm 10mm rgba(13, 27, 42, 0.25);
        margin-bottom: 0;
      }
    }
  </style>
  <link rel="stylesheet" href="cards-export.css" />
  <script src="cards-export.js" defer></script>
  <script src="card-embed-fields.js" defer></script>
  <script src="photo-embed.js" defer></script>
</head>
<body class="card-export-page">
  <div class="card-export-bar" role="toolbar" aria-label="Exportar">
    <span class="card-export-title">Cartão de Acesso Horizontal</span>
    <button type="button" class="card-export-print">Imprimir</button>
    <a class="card-export-pdf" href="access-card-horizontal-print.pdf" download>Descarregar PDF</a>
    <a
      class="card-export-psd"
      href="access-card-horizontal-300dpi.psd"
      download
      title="Gere o ficheiro com: python export_cards_to_psd.py"
    >Descarregar PSD</a>
  </div>
  <!-- Capa primeiro (como cartão de visita); dados no 2.º lado -->
  <div class="card-embed-preview-unit">
    <p class="card-embed-face-tag" aria-hidden="true">Front</p>
    <section class="sheet sheet--back" aria-label="Cartão de Acesso Horizontal - capa">
      <div class="back-inner">
        <div class="back-brand">
          <img
            class="back-logo"
            src="logo.png"
            alt="VOA logo"
            width="160"
            height="40"
            decoding="async"
          />
        </div>
      </div>
      <div class="trim-box" aria-hidden="true"></div>
    </section>
  </div>

  <div class="card-embed-preview-unit">
    <p class="card-embed-face-tag" aria-hidden="true">Back</p>
    <section class="sheet sheet--front" aria-label="Cartão de Acesso Horizontal - dados">
      <div class="inner">
        <div class="front-row">
          <div class="front-row-left">
            <div class="brand-block">
              <div class="brand-logo">
                <img
                  src="logo.png"
                  alt="VOA logo"
                  width="160"
                  height="40"
                  decoding="async"
                />
              </div>
            </div>
          </div>
          <div class="photo-wrap" aria-label="Fotografia">
            <div class="photo-viewport">
              <img class="photo-user-img" alt="" decoding="async" />
              <div class="photo-placeholder">
                Foto<br />3 × 4 cm
              </div>
            </div>
          </div>
        </div>
        <div class="role-to-band-spacer" aria-hidden="true"></div>

        <div class="data-band">
          <div class="data-grid">
            <div class="data-row">
              <span class="data-label">Nome</span>
              <span class="data-value" data-card-field="bandUpperName">RUI PINTO</span>
            </div>
            <div class="data-row">
              <span class="data-label">Função</span>
              <span class="data-value" data-card-field="role">Developer</span>
            </div>
            <div class="data-row">
              <span class="data-label">ID / N.º</span>
              <span class="data-value data-value--mono" data-card-field="idNumber">VOA-2026-00000</span>
            </div>
          </div>
          <div class="band-footer">
            <span class="band-site" data-card-field="bandSite">www.voa.aero</span>
            <span class="band-mark" data-card-field="bandMark">Cartão de Acesso · não transferível</span>
          </div>
        </div>
      </div>
      <div class="trim-box" aria-hidden="true"></div>
    </section>
  </div>
</body>
</html>
